{% extends "base.html" %}

{% block title %}
    {% if transaction %}編輯紀錄{% else %}新增紀錄{% endif %} - 個人記帳簿
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow border-0">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                <h3 class="mb-0 text-center fw-bold">{% if transaction %}編輯紀錄{% else %}新增收支紀錄{% endif %}</h3>
            </div>
            <div class="card-body p-4">
                <form action="{% if transaction %}{{ url_for('transaction.update_transaction', id=transaction.id) }}{% else %}{{ url_for('transaction.create_transaction') }}{% endif %}" method="POST">
                    
                    <div class="mb-4 text-center p-3 bg-light rounded">
                        <div class="form-check form-check-inline me-4">
                            <input class="form-check-input" type="radio" name="type" id="type_expense" value="expense" required
                                {% if not transaction or transaction.type == 'expense' %}checked{% endif %}>
                            <label class="form-check-label text-danger fw-bold" for="type_expense">支出</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="type" id="type_income" value="income" required
                                {% if transaction and transaction.type == 'income' %}checked{% endif %}>
                            <label class="form-check-label text-success fw-bold" for="type_income">收入</label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="date" class="form-label text-muted">日期 <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" id="date" name="date" required 
                               value="{% if transaction %}{{ transaction.date }}{% endif %}">
                    </div>

                    <div class="mb-3">
                        <label for="amount" class="form-label text-muted">金額 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" step="0.01" class="form-control" id="amount" name="amount" required placeholder="0.00"
                                   value="{% if transaction %}{{ transaction.amount }}{% endif %}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="category_id" class="form-label text-muted">類別 <span class="text-danger">*</span></label>
                        <select class="form-select" id="category_id" name="category_id" required>
                            <option value="" disabled {% if not transaction %}selected{% endif %}>請選擇分類...</option>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}" {% if transaction and transaction.category_id == cat.id %}selected{% endif %}>
                                {{ cat.name }} ({{ '收入' if cat.type == 'income' else '支出' }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="description" class="form-label text-muted">項目說明 (選填)</label>
                        <input type="text" class="form-control" id="description" name="description" placeholder="例如：午餐、車資、薪水等"
                               value="{% if transaction %}{{ transaction.description }}{% endif %}">
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                            {% if transaction %}儲存變更{% else %}確認新增{% endif %}
                        </button>
                        <a href="{{ url_for('transaction.list_transactions') }}" class="btn btn-light">取消並返回列表</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // 若為新增，自動將日期帶入今天
    document.addEventListener("DOMContentLoaded", function() {
        const dateInput = document.getElementById("date");
        if (!dateInput.value) {
            const today = new Date().toISOString().split('T')[0];
            dateInput.value = today;
        }
    });
</script>
{% endblock %}
