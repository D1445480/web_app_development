<!DOCTYPE html>
<html lang="zh-Hant" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>個人記帳系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark glass-nav mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('dashboard.index') }}">💰 Antigravity Ledger</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard.index') }}">總覽</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('record.index') }}">明細清單</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('category.index') }}">分類預算</a></li>
                    <li class="nav-item ms-2"><a class="btn btn-premium btn-sm mt-1" href="{{ url_for('record.new') }}">+ 記一筆</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show glass-card mb-4" role="alert">
                {{ message }}
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
